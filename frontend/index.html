<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <div class="container">

        <div class="auth-box">

            <h1>Login</h1>

            <form id="loginForm">

                <input
                    type="email"
                    placeholder="Email"
                    id="email"
                    required
                >

                <input
                    type="password"
                    placeholder="Password"
                    id="password"
                    required
                >

                <button type="submit">
                    Login
                </button>

            </form>

            <p>
                Don't have an account?
                <a href="/register.html">Register</a>
            </p>

        </div>

    </div>

    <script src="./js/login.js"></script>

</body>
</html>
