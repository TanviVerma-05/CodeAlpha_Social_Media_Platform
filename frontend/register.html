<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <div class="container">

        <div class="auth-box">

            <h1>Register</h1>

            <form id="registerForm">

                <input
                    type="text"
                    placeholder="Username"
                    id="username"
                    required
                >

                <input
                    type="email"
                    placeholder="Email"
                    id="email"
                    required
                >

                <input
                    type="password"
                    placeholder="Password"
                    id="password"
                    required
                >

                <button type="submit">
                    Register
                </button>

            </form>

            <p>
                Already have an account?
                <a href="/index.html">Login</a>
            </p>

        </div>

    </div>

    <script src="./js/register.js"></script>

</body>
</html>
